{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Cadastro de Pet</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_pet">ID Pet:</label>
            <input type="text" id="id_pet" name="id_pet" readonly>
        </div>
        <div class="form-group">
            <label for="nome_pet">Nome do Pet:</label>
            <input type="text" id="nome_pet" name="nome_pet" required>
        </div>
        <div class="form-group">
            <label for="raca_pet">Raça do Pet:</label>
            <input type="text" id="raca_pet" name="raca_pet" required>
        </div>
        <div class="form-group">
            <label for="id_tutor">ID Tutor:</label>
            <input type="text" id="id_tutor" name="id_tutor" required>
        </div>
        <div class="form-group">
            <label for="nome_tutor">Nome do Tutor:</label>
            <input type="text" id="nome_tutor" name="nome_tutor" required>
        </div>
        <div class="form-group">
            <label for="contato01">Contato 01:</label>
            <input type="text" id="contato01" name="contato01" required>
        </div>
        <div class="form-group">
            <label for="contato02">Contato 02:</label>
            <input type="text" id="contato02" name="contato02">
        </div>
        <div class="form-group">
            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua" required>
        </div>
        <div class="form-group">
            <label for="numero">Número:</label>
            <input type="text" id="numero" name="numero" required>
        </div>
        <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro" required>
        </div>
        <div class="form-group">
            <label for="porte_pet">Porte do Pet:</label>
            <select id="porte_pet" name="porte_pet" required>
                <option value="">Selecione</option>
                <option value="pequeno">Pequeno</option>
                <option value="medio">Médio</option>
                <option value="grande">Grande</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>
</div>
{% endblock %}
