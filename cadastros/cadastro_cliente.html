{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Cadastro de Cliente</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_cliente">ID Cliente:</label>
            <input type="text" id="id_cliente" name="id_cliente" readonly>
        </div>
        <div class="form-group">
            <label for="nome_cliente">Nome do Cliente:</label>
            <input type="text" id="nome_cliente" name="nome_cliente" required>
        </div>
        <div class="form-group">
            <label for="contato01">Contato 01:</label>
            <input type="text" id="contato01" name="contato01" required>
        </div>
        <div class="form-group">
            <label for="contato02">Contato 02:</label>
            <input type="text" id="contato02" name="contato02">
        </div>
        <div class="form-group">
            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua" required>
        </div>
        <div class="form-group">
            <label for="numero">Número:</label>
            <input type="text" id="numero" name="numero" required>
        </div>
        <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro" required>
        </div>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>
</div>
{% endblock %}
