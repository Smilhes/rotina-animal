{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Novo Agendamento</h1>
</div>

<div class="card card-tv">
    <div class="card-body p-4">
        <form class="row g-3" method="POST" action="{% url 'agendamento' %}">
            {% csrf_token %}
            
            <div class="col-md-6">
                <label class="form-label">Tutor (Pesquisar)</label>
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-control form-control-lg" 
                        id="inputTutor"
                        placeholder="Clique em pesquisar tutor..."
                        readonly
                        required
                    >
                    <button 
                        class="btn btn-outline-primary" 
                        type="button" 
                        data-bs-toggle="modal" 
                        data-bs-target="#modalClientes"
                    >
                        <i class="bi bi-search me-2"></i>Pesquisar
                    </button>
                </div>
                <input type="hidden" id="clienteId" name="cliente_id">
            </div>

            <div class="col-md-6">
                <label class="form-label">Pet</label>
                <select class="form-select form-control-lg" id="selectPet" name="pet_id" disabled required>
                    <option value="">Selecione um cliente primeiro</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data</label>
                <input type="date" class="form-control" name="data" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Hora Início</label>
                <input type="time" class="form-control" name="hora_inicio" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo de Serviço</label>
                <select class="form-select" name="tipo_servico">
                    <option>Banho</option>
                    <option>Tosa Completa</option>
                    <option>Tosa Higiênica</option>
                    <option>Banho + Tosa</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" class="form-control" name="valor" placeholder="0,00" step="0.01">
            </div>

            <div class="col-12 mt-4">
                <div class="form-check form-switch p-3 border rounded bg-light">
                    <input class="form-check-input ms-0 me-2" type="checkbox" id="recorrente">
                    <label class="form-check-label fw-bold" for="recorrente">Pacote Recorrente</label>
                </div>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">Confirmar Agendamento</button>
                <a href="{% url 'dashboard' %}" class="btn btn-link btn-lg">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="modalClientes" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Pesquisar Tutor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control mb-3" id="inputBuscaClientes" placeholder="Digite nome ou CPF...">
                <div id="listaClientes" class="list-group">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputBusca = document.getElementById('inputBuscaClientes');
    const lista = document.getElementById('listaClientes');
    const inputTutor = document.getElementById('inputTutor');
    const clienteIdHidden = document.getElementById('clienteId');
    const selectPet = document.getElementById('selectPet');
    const modal = new bootstrap.Modal(document.getElementById('modalClientes'));

    inputBusca.addEventListener('input', function() {
        if (this.value.length < 2) return;
        fetch(`/api/buscar-clientes/?termo=${this.value}`)
            .then(r => r.json())
            .then(data => {
                lista.innerHTML = data.clientes.map(c => `
                    <button type="button" class="list-group-item list-group-item-action" onclick="selecionarCliente(${c.id}, '${c.nome}')">
                        ${c.nome} - ${c.telefone}
                    </button>
                `).join('');
            });
    });

    window.selecionarCliente = function(id, nome) {
        inputTutor.value = nome;
        clienteIdHidden.value = id;
        carregarPets(id);
        modal.hide();
    };

    function carregarPets(cid) {
        fetch(`/api/buscar-pets/${cid}/`)
            .then(r => r.json())
            .then(data => {
                selectPet.innerHTML = '<option value="">Selecione o pet</option>' + 
                    data.pets.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
                selectPet.disabled = false;
            });
    }
});
</script>
{% endblock %}
