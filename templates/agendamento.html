{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Novo Agendamento</h1>
</div>

<div class="card card-tv">
    <div class="card-body p-4">
        <form class="row g-3" id="formularioAgendamento">
            <div class="col-md-6">
                <label class="form-label">Tutor (Pesquisar)</label>
                <div class="input-group">
                    <input 
                        type="text" 
                        class="form-control form-control-lg" 
                        id="inputTutor"
                        placeholder="Nome ou CPF"
                        readonly
                    >
                    <button 
                        class="btn btn-outline-primary" 
                        type="button" 
                        data-bs-toggle="modal" 
                        data-bs-target="#modalClientes"
                        id="btnPesquisarTutor"
                    >
                        <i class="bi bi-search me-2"></i>Pesquisar
                    </button>
                </div>
                <input type="hidden" id="clienteId" name="cliente_id">
            </div>

            <div class="col-md-6">
                <label class="form-label">Pet</label>
                <select class="form-select form-control-lg" id="selectPet" name="pet_id" disabled>
                    <option value="">Selecione um cliente primeiro</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data</label>
                <input type="date" class="form-control" name="data">
            </div>
            <div class="col-md-3">
                <label class="form-label">Hora Início</label>
                <input type="time" class="form-control" name="hora_inicio">
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo de Serviço</label>
                <select class="form-select" name="tipo_servico">
                    <option>Banho</option>
                    <option>Tosa Completa</option>
                    <option>Tosa Higiênica</option>
                    <option>Corte de Unhas</option>
                    <option>Limpeza de Ouvidos</option>
                    <option>Banho + Tosa</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" class="form-control" name="valor" placeholder="0,00" step="0.01">
            </div>

            <div class="col-12 mt-4">
                <div class="form-check form-switch p-3 border rounded bg-light">
                    <input 
                        class="form-check-input ms-0 me-2" 
                        type="checkbox" 
                        id="recorrente"
                        name="recorrente"
                    >
                    <label class="form-check-label fw-bold" for="recorrente">
                        Pacote Recorrente (Semanal/Quinzenal)
                    </label>
                </div>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">Confirmar Agendamento</button>
                <a href="{% url 'dashboard' %}" class="btn btn-link btn-lg">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<!-- Modal de Pesquisa de Clientes -->
<div class="modal fade" id="modalClientes" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Pesquisar Tutor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Digite o nome ou CPF do tutor:</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg" 
                        id="inputBuscaClientes"
                        placeholder="Ex: João Silva ou 123.456.789-00"
                        autocomplete="off"
                    >
                </div>

                <div id="resultadosClientes" class="mt-3" style="display: none;">
                    <h6 class="mb-3">Resultados da busca:</h6>
                    <div id="listaClientes" class="list-group" style="max-height: 400px; overflow-y: auto;">
                        <!-- Resultados serão preenchidos aqui -->
                    </div>
                </div>

                <div id="nenhumResultado" class="alert alert-info mt-3" style="display: none;">
                    <i class="bi bi-info-circle me-2"></i>
                    Nenhum cliente encontrado. Tente outro nome ou CPF.
                </div>

                <div id="semBusca" class="alert alert-secondary mt-3">
                    <i class="bi bi-search me-2"></i>
                    Digite acima para pesquisar clientes disponíveis.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputBuscaClientes = document.getElementById('inputBuscaClientes');
    const listaClientes = document.getElementById('listaClientes');
    const resultadosClientes = document.getElementById('resultadosClientes');
    const nenhumResultado = document.getElementById('nenhumResultado');
    const semBusca = document.getElementById('semBusca');
    const inputTutor = document.getElementById('inputTutor');
    const clienteId = document.getElementById('clienteId');
    const selectPet = document.getElementById('selectPet');
    const modalClientes = new bootstrap.Modal(document.getElementById('modalClientes'));

    let timeoutBusca;

    // Buscar clientes enquanto digita
    inputBuscaClientes.addEventListener('input', function() {
        clearTimeout(timeoutBusca);
        const termo = this.value.trim();

        if (termo.length < 2) {
            resultadosClientes.style.display = 'none';
            nenhumResultado.style.display = 'none';
            semBusca.style.display = 'block';
            listaClientes.innerHTML = '';
            return;
        }

        semBusca.style.display = 'none';

        timeoutBusca = setTimeout(() => {
            fetch(`/api/buscar-clientes/?termo=${encodeURIComponent(termo)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.clientes.length === 0) {
                        resultadosClientes.style.display = 'none';
                        nenhumResultado.style.display = 'block';
                        listaClientes.innerHTML = '';
                    } else {
                        nenhumResultado.style.display = 'none';
                        resultadosClientes.style.display = 'block';
                        
                        listaClientes.innerHTML = data.clientes.map(cliente => `
                            <button type="button" class="list-group-item list-group-item-action" 
                                    onclick="selecionarCliente(${cliente.id}, '${cliente.nome}', '${cliente.telefone}')">
                                <div class="d-flex w-100 justify-content-between">
                                    <strong>${cliente.nome}</strong>
                                    <small class="text-muted">${cliente.total_pets} pet(s)</small>
                                </div>
                                <small class="text-muted">
                                    <i class="bi bi-telephone me-1"></i>${cliente.telefone}
                                    {% if cliente.cpf %}
                                        | CPF: ${cliente.cpf}
                                    {% endif %}
                                </small>
                            </button>
                        `).join('');
                    }
                })
                .catch(error => {
                    console.error('Erro ao buscar clientes:', error);
                    resultadosClientes.style.display = 'none';
                    nenhumResultado.style.display = 'block';
                });
        }, 300);
    });

    window.selecionarCliente = function(id, nome, telefone) {
        // Preencher input do tutor
        inputTutor.value = `${nome} - ${telefone}`;
        clienteId.value = id;

        // Carregar pets do cliente
        carregarPetsCliente(id);

        // Fechar modal
        modalClientes.hide();
    };

    function carregarPetsCliente(clienteId) {
        fetch(`/api/buscar-pets/${clienteId}/`)
            .then(response => response.json())
            .then(data => {
                selectPet.innerHTML = '<option value="">Selecione o pet</option>';
                
                if (data.pets.length > 0) {
                    data.pets.forEach(pet => {
                        const option = document.createElement('option');
                        option.value = pet.id;
                        option.textContent = pet.nome;
                        selectPet.appendChild(option);
                    });
                    selectPet.disabled = false;
                } else {
                    const option = document.createElement('option');
                    option.textContent = 'Nenhum pet cadastrado para este cliente';
                    option.disabled = true;
                    selectPet.appendChild(option);
                    selectPet.disabled = true;
                }
            })
            .catch(error => {
                console.error('Erro ao carregar pets:', error);
                selectPet.innerHTML = '<option>Erro ao carregar pets</option>';
            });
    }

    // Limpar ao abrir modal
    document.getElementById('modalClientes').addEventListener('show.bs.modal', function() {
        inputBuscaClientes.value = '';
        inputBuscaClientes.focus();
        resultadosClientes.style.display = 'none';
        nenhumResultado.style.display = 'none';
        semBusca.style.display = 'block';
        listaClientes.innerHTML = '';
    });
});
</script>
{% endblock %}
