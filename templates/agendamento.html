{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Novo Agendamento</h1>
</div>

<div class="card card-tv">
    <div class="card-body p-4">
        <form class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Tutor (Pesquisar)</label>
                <input type="text" class="form-control form-control-lg" placeholder="Nome ou CPF">
            </div>
            <div class="col-md-6">
                <label class="form-label">Pet</label>
                <select class="form-select form-control-lg">
                    <option>Selecione o animal</option>
                    <option>Thor (Golden Retriever)</option>
                    <option>Mel (Poodle)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Data</label>
                <input type="date" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Hora Início</label>
                <input type="time" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo de Serviço</label>
                <select class="form-select">
                    <option>Banho</option>
                    <option>Tosa Completa</option>
                    <option>Tosa Higiênica</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" class="form-control" placeholder="0,00">
            </div>
            <div class="col-12 mt-4">
                <div class="form-check form-switch p-3 border rounded bg-light">
                    <input class="form-check-input ms-0 me-2" type="checkbox" id="recorrente">
                    <label class="form-check-label fw-bold" for="recorrente">Pacote Recorrente (Semanal/Quinzenal)</label>
                </div>
            </div>
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg px-5">Confirmar Agendamento</button>
                <a href="{% url 'dashboard' %}" class="btn btn-link btn-lg">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
