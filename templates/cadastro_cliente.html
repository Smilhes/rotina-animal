{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
    <h1 class="h2">Cadastro de Cliente e Pets</h1>
    <button class="btn btn-primary"><i class="bi bi-save me-2"></i>Salvar Tudo</button>
</div>

<div class="row">
    <!-- Dados do Tutor -->
    <div class="col-lg-5">
        <div class="card card-tv mb-4">
            <div class="card-header bg-white fw-bold">Dados do Tutor</div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">NOME COMPLETO</label>
                    <input type="text" class="form-control" value="{{ cliente.tutor }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">TELEFONE / WHATSAPP</label>
                    <input type="text" class="form-control" value="{{ cliente.telefone }}">
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">ID / CPF</label>
                    <input type="text" class="form-control" placeholder="000.000.000-00">
                </div>
            </div>
        </div>
    </div>

    <!-- Lista de Pets (Relação 1 para N) -->
    <div class="col-lg-7">
        <div class="card card-tv">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">Pets Vinculados</span>
                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-plus-lg me-1"></i>Adicionar Novo Pet</button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Nome do Pet</th>
                                <th>Raça</th>
                                <th>Idade</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for pet in cliente.pets %}
                            <tr>
                                <td class="fw-bold">{{ pet.nome }}</td>
                                <td><span class="badge bg-light text-dark">{{ pet.raca }}</span></td>
                                <td>{{ pet.idade }}</td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-light"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
