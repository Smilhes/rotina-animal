<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <title>Login - Rotina Animal</title>
    <style>
        body { background: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body class="container">
    <div class="login-card mx-auto text-center">
        <i class="bi bi-paw-fill text-primary" style="font-size: 3rem;"></i>
        <h2 class="fw-bold mb-4">Rotina Animal</h2>
        <p class="text-muted mb-4">Acesso Administrativo</p>
        
        <form action="{% url 'dashboard' %}" method="GET"> <!-- GET apenas para demonstração -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com">
                <label for="email">E-mail</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="pass" placeholder="Senha">
                <label for="pass">Senha</label>
            </div>
            <button class="btn btn-primary w-100 btn-lg mb-3" type="submit">Entrar</button>
            <a href="#" class="text-decoration-none small">Esqueceu a senha?</a>
        </form>
    </div>
</body>
</html>
