{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
    <div>
        <h1 class="h2">
            {% if modo == 'criar' %}
                Novo Pet para {{ cliente.nome_cliente }}
            {% else %}
                Editar Pet
            {% endif %}
        </h1>
    </div>
    <a href="{% url 'cliente_detail' cliente.id %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Voltar
    </a>
</div>

{% if messages %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
    {% for message in messages %}
        {{ message }}
    {% endfor %}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="row">
    <div class="col-lg-6">
        <div class="card card-tv">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Pet *</label>
                        <input type="text" name="nome_pet" class="form-control" 
                               placeholder="Ex: Thor, Luna, Rex" 
                               value="{% if pet %}{{ pet.nome_pet }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Raça *</label>
                        <input type="text" name="raca_pet" class="form-control" 
                               placeholder="Ex: Golden Retriever, Poodle" 
                               value="{% if pet %}{{ pet.raca_pet }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Porte *</label>
                        <select name="porte_pet" class="form-select" required>
                            <option value="">Selecione o porte...</option>
                            <option value="pequeno" {% if pet and pet.porte_pet == 'pequeno' %}selected{% endif %}>Pequeno</option>
                            <option value="medio" {% if pet and pet.porte_pet == 'medio' %}selected{% endif %}>Médio</option>
                            <option value="grande" {% if pet and pet.porte_pet == 'grande' %}selected{% endif %}>Grande</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Idade</label>
                        <input type="text" name="idade_pet" class="form-control" 
                               placeholder="Ex: 3 anos, 2 meses" 
                               value="{% if pet %}{{ pet.idade_pet }}{% endif %}">
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-2"></i>
                            {% if modo == 'criar' %}Adicionar Pet{% else %}Atualizar Pet{% endif %}
                        </button>
                        <a href="{% url 'cliente_detail' cliente.id %}" class="btn btn-secondary">
                            <i class="bi bi-x me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
