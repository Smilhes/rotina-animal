{% extends 'base.html' %}
{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-center">
    <h1 class="h2">
        {% if modo == 'criar' %}
            Novo Cliente
        {% else %}
            Editar Cliente
        {% endif %}
    </h1>
    <a href="{% url 'cadastro_cliente' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Voltar
    </a>
</div>

{% if messages %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
    {% for message in messages %}
        {{ message }}
    {% endfor %}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="row">
    <div class="col-lg-6">
        <div class="card card-tv">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo *</label>
                        <input type="text" name="nome_cliente" class="form-control" 
                               value="{% if cliente %}{{ cliente.nome_cliente }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone / WhatsApp *</label>
                        <input type="text" name="telefone" class="form-control" 
                               placeholder="(11) 98888-7777" 
                               value="{% if cliente %}{{ cliente.telefone }}{% endif %}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">CPF</label>
                        <input type="text" name="cpf" class="form-control" 
                               placeholder="000.000.000-00" 
                               value="{% if cliente %}{{ cliente.cpf }}{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Rua</label>
                        <input type="text" name="rua" class="form-control" 
                               value="{% if cliente %}{{ cliente.rua }}{% endif %}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Número</label>
                            <input type="text" name="numero" class="form-control" 
                                   value="{% if cliente %}{{ cliente.numero }}{% endif %}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Bairro</label>
                            <input type="text" name="bairro" class="form-control" 
                                   value="{% if cliente %}{{ cliente.bairro }}{% endif %}">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-2"></i>
                            {% if modo == 'criar' %}Cadastrar{% else %}Atualizar{% endif %}
                        </button>
                        <a href="{% url 'cadastro_cliente' %}" class="btn btn-secondary">
                            <i class="bi bi-x me-2"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
